services:
  # ===== BACKEND API (FastAPI) =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # Eliminamos depends_on ya que db y minio son externos
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env

  # ===== FRONTEND (React + Nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

# No se requieren volúmenes locales para DB o MinIO ya que son externos
